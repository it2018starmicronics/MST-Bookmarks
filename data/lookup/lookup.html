<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serial Number Lookup</title>

<link rel="stylesheet" href="css/styles.css?v=1">

</head>
<body>

<!-- =========================
     TOP LOOKUP ROW
========================= -->
<div class="container">
    <div class="lookup-row">

        <!-- Serial Input -->
        <div class="lookup-input">
            <input 
                type="text" 
                id="serialInput" 
                placeholder="Enter Serial#"
                autofocus
            >
        </div>

        <!-- Lookup Button -->
        <div class="lookup-button">
            <button onclick="lookupSerial()">Lookup</button>
        </div>

        <!-- Results -->
        <div class="lookup-results" id="result">
            <!-- Lookup results will appear here -->
        </div>

    </div>
</div>

<!-- =========================
     FOUR RESOURCE COLUMNS
========================= -->
<div class="page-layout">

    <div class="resource-panel">
        <h2>Setup & Installation</h2>
        <div id="setup-resources">
            <!-- Dynamic links for setup will go here -->
        </div>
    </div>

    <div class="resource-panel">
        <h2>Communcations</h2>
        <div id="network-resources">
            <!-- Dynamic links for network will go here -->
        </div>
    </div>

    <div class="resource-panel">
        <h2>Maintenance</h2>
        <div id="maintenance-resources">
            <!-- Dynamic links for maintenance will go here -->
        </div>
    </div>

    <div class="resource-panel">
        <h2>Advanced Features</h2>
        <div id="advanced-resources">
            <!-- Dynamic links for advanced features will go here -->
        </div>
    </div>

</div>

<script src="js/script.js?v=4"></script>

</body>
</html>
